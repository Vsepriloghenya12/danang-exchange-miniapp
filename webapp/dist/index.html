    <style>
      .theme-client .mx-langSwitchBtn {
        position: fixed !important;
        top: max(10px, calc(env(safe-area-inset-top, 0px) + 8px)) !important;
        left: 12px !important;
        width: 56px !important;
        min-width: 56px !important;
        height: 26px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        border-radius: 999px !important;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.99) 0%, rgba(246, 248, 252, 0.96) 100%) !important;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14), inset 0 1px rgba(255, 255, 255, 0.92) !important;
        color: rgba(9, 23, 33, 0.88) !important;
        font-size: 11px !important;
        font-weight: 900 !important;
        letter-spacing: 0.08em !important;
        line-height: 1 !important;
        visibility: visible !important;
        opacity: 1 !important;
        z-index: 9999 !important;
      }

      html[data-theme="dark"] .theme-client .mx-langSwitchBtn {
        background: linear-gradient(180deg, rgba(31, 43, 56, 0.99) 0%, rgba(22, 31, 41, 0.98) 100%) !important;
        box-shadow: 0 0 0 1px rgba(246, 198, 0, 0.12) inset, 0 0 16px rgba(246, 198, 0, 0.08), 0 10px 22px rgba(0, 0, 0, 0.34) !important;
        color: rgba(246, 198, 0, 0.98) !important;
      }

      @media (max-width: 380px) {
        .theme-client .mx-langSwitchBtn {
          left: 10px !important;
          width: 52px !important;
          min-width: 52px !important;
          height: 24px !important;
          font-size: 10px !important;
        }
      }

      .mx-runtimeLangFloatingBtn {
        position: fixed;
        display: none;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.99) 0%, rgba(246, 248, 252, 0.96) 100%);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14), inset 0 1px rgba(255, 255, 255, 0.92);
        color: rgba(9, 23, 33, 0.88);
        font-weight: 900;
        letter-spacing: 0.08em;
        line-height: 1;
        cursor: pointer;
        z-index: 10001;
      }

      html[data-theme="dark"] .mx-runtimeLangFloatingBtn {
        background: linear-gradient(180deg, rgba(31, 43, 56, 0.99) 0%, rgba(22, 31, 41, 0.98) 100%);
        box-shadow: 0 0 0 1px rgba(246, 198, 0, 0.12) inset, 0 0 16px rgba(246, 198, 0, 0.08), 0 10px 22px rgba(0, 0, 0, 0.34);
        color: rgba(246, 198, 0, 0.98);
      }
    </style>
    <script>
      (function () {
        if (typeof window === "undefined") return;
        if (window.location.pathname.indexOf("/admin") === 0) return;

        var btn = null;

        function currentLang() {
          try {
            var raw = String(document.documentElement.getAttribute("lang") || localStorage.getItem("mx_lang") || "ru").toLowerCase();
            return raw === "en" ? "en" : "ru";
          } catch (e) {
            return "ru";
          }
        }

        function ensureButton() {
          if (btn) return btn;
          btn = document.createElement("button");
          btn.type = "button";
          btn.className = "mx-runtimeLangFloatingBtn";
          btn.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            var next = currentLang() === "en" ? "ru" : "en";
            try {
              localStorage.setItem("mx_lang", next);
              document.documentElement.setAttribute("lang", next);
            } catch (e) {}
            window.location.reload();
          });
          document.addEventListener("click", function (event) {
            if (!(event.target instanceof Element)) return;
            var target = event.target.closest(".mx-langSwitchBtn");
            if (!target || target === btn) return;
            event.preventDefault();
            event.stopPropagation();
          }, true);
          document.body.appendChild(btn);
          return btn;
        }

        function syncButton() {
          var page = document.querySelector(".theme-client.mx-homePage");
          var themeBtn = page ? page.querySelector(".mx-themeBtn") : null;
          var nativeLangBtn = page ? page.querySelector(".mx-langSwitchBtn") : null;

          if (!(themeBtn instanceof HTMLElement)) {
            if (btn) btn.style.display = "none";
            return;
          }

          var node = ensureButton();
          if (nativeLangBtn instanceof HTMLElement) {
            nativeLangBtn.style.display = "none";
            nativeLangBtn.style.visibility = "hidden";
            nativeLangBtn.style.opacity = "0";
            nativeLangBtn.tabIndex = -1;
            nativeLangBtn.setAttribute("aria-hidden", "true");
          }

          var rect = themeBtn.getBoundingClientRect();
          var mobile = window.innerWidth <= 380;
          var width = mobile ? 52 : 56;
          var height = mobile ? 24 : 26;
          var gap = 8;
          var top = Math.max(10, Math.round(rect.top - height - gap));
          var left = Math.round(rect.left + (rect.width - width) / 2);
          var lang = currentLang();
          var next = lang === "en" ? "ru" : "en";

          node.textContent = next === "en" ? "EN" : "RU";
          node.title = next === "en" ? "Switch to English" : "Switch to Russian";
          node.setAttribute("aria-label", node.title);
          node.style.display = "flex";
          node.style.top = top + "px";
          node.style.left = left + "px";
          node.style.width = width + "px";
          node.style.minWidth = width + "px";
          node.style.height = height + "px";
          node.style.fontSize = (mobile ? 10 : 11) + "px";
        }

        var run = function () {
          window.requestAnimationFrame(syncButton);
        };

        document.addEventListener("DOMContentLoaded", run);
        window.addEventListener("load", run, { passive: true });
        window.addEventListener("resize", run, { passive: true });
        window.addEventListener("orientationchange", run, { passive: true });
        var observer = new MutationObserver(run);
        observer.observe(document.documentElement, { subtree: true, childList: true, attributes: true, attributeFilter: ["class", "lang", "data-theme"] });
      })();
    </script>
  </head>
