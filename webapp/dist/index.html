    <script>
      (function () {
        if (typeof window === "undefined") return;
        if (window.location.pathname.indexOf("/admin") === 0) return;

        var btn = null;

        function currentLang() {
          try {
            var raw = String(new URLSearchParams(window.location.search || "").get("lang") || localStorage.getItem("mx_lang") || document.documentElement.getAttribute("lang") || "ru").toLowerCase();
            return raw === "en" ? "en" : "ru";
          } catch (e) {
            return "ru";
          }
        }

        function nextLang() {
          return currentLang() === "en" ? "ru" : "en";
        }

        function homePage() {
          return document.querySelector(".theme-client.mx-homePage");
        }

        function controlsStack(page) {
          return page ? page.querySelector(".mx-homeControlsStack, .mx-topLeftStack") : null;
        }

        function nativeLangButton(page) {
          return page ? page.querySelector(".mx-homeLangSwitchBtn, .mx-langSwitchBtn") : null;
        }

        function themeButton(page) {
          return page ? page.querySelector(".mx-homeThemeBtn, .mx-themeBtn") : null;
        }

        function setButtonCopy(node) {
          if (!(node instanceof HTMLElement)) return;
          var next = nextLang();
          var switchToEnglish = next === "en";
          var title = switchToEnglish ? "Switch to English" : "Switch to Russian";
          node.textContent = switchToEnglish ? "EN" : "RU";
          node.title = title;
          node.setAttribute("aria-label", title);
        }

        function isVisible(node) {
          if (!(node instanceof HTMLElement)) return false;
          var style = window.getComputedStyle(node);
          return style.display !== "none" && style.visibility !== "hidden" && Number(style.opacity || "1") > 0.01;
        }

        function applyLangSwitch(next) {
          try {
            localStorage.setItem("mx_lang", next);
            document.documentElement.setAttribute("lang", next);
          } catch (e) {}

          try {
            var url = new URL(window.location.href);
            url.searchParams.set("lang", next);
            url.searchParams.delete("_langv");
            window.history.replaceState(null, "", url.toString());
          } catch (e) {
            // ignore
          }

          try {
            window.dispatchEvent(new CustomEvent("mx:lang-runtime-switch", { detail: next }));
          } catch (e) {}
        }

        function ensureButton() {
          if (btn) return btn;
          btn = document.createElement("button");
          btn.type = "button";
          btn.className = "mx-runtimeLangFloatingBtn";
          btn.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            applyLangSwitch(nextLang());
          });
          document.body.appendChild(btn);
          return btn;
        }

        function syncButton() {
          var page = homePage();
          if (!page) {
            if (btn) btn.style.display = "none";
            return;
          }

          var native = nativeLangButton(page);
          var themeBtn = themeButton(page);
          var stack = controlsStack(page) || (themeBtn instanceof HTMLElement ? themeBtn.parentElement : null);

          if (native instanceof HTMLElement) {
            setButtonCopy(native);
          }

          if (!(themeBtn instanceof HTMLElement) || !(stack instanceof HTMLElement)) {
            if (btn) btn.style.display = "none";
            return;
          }

          if (isVisible(native)) {
            if (btn) btn.style.display = "none";
            return;
          }

          var node = ensureButton();
          var mobile = window.innerWidth <= 380;

          setButtonCopy(node);
          if (node.parentElement !== stack) {
            if (themeBtn.parentElement === stack) stack.insertBefore(node, themeBtn);
            else stack.prepend(node);
          }
          node.style.display = "flex";
          node.style.width = (mobile ? 52 : 56) + "px";
          node.style.minWidth = (mobile ? 52 : 56) + "px";
          node.style.height = (mobile ? 52 : 56) + "px";
          node.style.fontSize = (mobile ? 13 : 15) + "px";
        }

        var run = function () {
          window.requestAnimationFrame(syncButton);
        };

        document.addEventListener("DOMContentLoaded", run);
        window.addEventListener("load", run, { passive: true });
        window.addEventListener("resize", run, { passive: true });
        window.addEventListener("orientationchange", run, { passive: true });
        var observer = new MutationObserver(run);
        observer.observe(document.documentElement, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ["class", "lang", "data-theme"],
        });
      })();
    </script>
