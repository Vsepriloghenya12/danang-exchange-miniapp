<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- App icon (easy to replace): webapp/public/brand/app-icon.png -->
    <link rel="icon" type="image/png" href="/brand/app-icon.png?v=28" />
    <link rel="apple-touch-icon" href="/brand/app-icon.png?v=28" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#17212b" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload key images so they appear instantly in Telegram WebView -->
    <link rel="preload" as="image" href="/brand/main-logo-light.png?v31-light" fetchpriority="high" />
    <link rel="preload" as="image" href="/brand/main-logo-dark.png?v31-dark" fetchpriority="high" />
    <link rel="preload" as="image" href="/brand/status-standard.svg?v48-standard" fetchpriority="high" />
    <link rel="preload" as="image" href="/brand/status-silver.svg?v48-silver" fetchpriority="high" />
    <link rel="preload" as="image" href="/brand/status-gold.svg?v48-gold" fetchpriority="high" />

    <title>Обмен валют — Дананг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      .theme-client .mx-langSwitchBtn {
        position: fixed !important;
        top: max(10px, calc(env(safe-area-inset-top, 0px) + 8px)) !important;
        left: 12px !important;
        width: 56px !important;
        min-width: 56px !important;
        height: 26px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        margin: 0 !important;
        padding: 0 !important;
        border: none !important;
        border-radius: 999px !important;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.99) 0%, rgba(246, 248, 252, 0.96) 100%) !important;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14), inset 0 1px rgba(255, 255, 255, 0.92) !important;
        color: rgba(9, 23, 33, 0.88) !important;
        font-size: 11px !important;
        font-weight: 900 !important;
        letter-spacing: 0.08em !important;
        line-height: 1 !important;
        visibility: visible !important;
        opacity: 1 !important;
        z-index: 9999 !important;
      }

      html[data-theme="dark"] .theme-client .mx-langSwitchBtn {
        background: linear-gradient(180deg, rgba(31, 43, 56, 0.99) 0%, rgba(22, 31, 41, 0.98) 100%) !important;
        box-shadow: 0 0 0 1px rgba(246, 198, 0, 0.12) inset, 0 0 16px rgba(246, 198, 0, 0.08), 0 10px 22px rgba(0, 0, 0, 0.34) !important;
        color: rgba(246, 198, 0, 0.98) !important;
      }

      @media (max-width: 380px) {
        .theme-client .mx-langSwitchBtn {
          left: 10px !important;
          width: 52px !important;
          min-width: 52px !important;
          height: 24px !important;
          font-size: 10px !important;
        }
      }
    </style>
  </head>
  <body style="background:#17212b;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
