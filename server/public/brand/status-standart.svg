<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="coinBase" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(165 128) rotate(38) scale(290 270)">
      <stop offset="0%" stop-color="#EEE5D0"/>
      <stop offset="33%" stop-color="#D9C6A0"/>
      <stop offset="68%" stop-color="#B99976"/>
      <stop offset="100%" stop-color="#A78567"/>
    </radialGradient>

    <linearGradient id="coinSweep" x1="106" y1="95" x2="427" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4EBD6" stop-opacity="0.55"/>
      <stop offset="27%" stop-color="#E3D0AA" stop-opacity="0.24"/>
      <stop offset="56%" stop-color="#C6A27F" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8D6D55" stop-opacity="0.20"/>
    </linearGradient>

    <linearGradient id="rim" x1="58" y1="70" x2="451" y2="446" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D9C1A2"/>
      <stop offset="45%" stop-color="#C09F7C"/>
      <stop offset="100%" stop-color="#81644F"/>
    </linearGradient>

    <linearGradient id="starBorderFill" x1="186" y1="185" x2="338" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C2A688"/>
      <stop offset="100%" stop-color="#95765F"/>
    </linearGradient>

    <linearGradient id="starShadowFill" x1="219" y1="210" x2="355" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A1846D" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7F6756" stop-opacity="0.92"/>
    </linearGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>

    <clipPath id="coinClip">
      <circle cx="256" cy="256" r="245"/>
    </clipPath>
  </defs>

  <!-- transparent outside; only the badge remains -->
  <circle cx="256" cy="256" r="247" fill="url(#coinBase)"/>
  <circle cx="256" cy="256" r="247" fill="url(#coinSweep)"/>
  <circle cx="256" cy="256" r="245.5" stroke="url(#rim)" stroke-width="4"/>

  <g clip-path="url(#coinClip)">
    <ellipse cx="166" cy="138" rx="135" ry="102" transform="rotate(-22 166 138)"
             fill="#FFF6E7" opacity="0.16"/>

    <ellipse cx="129" cy="130" rx="24" ry="24" fill="#FFF6E7" opacity="0.16" filter="url(#softBlur)"/>

    <path d="M56 208
             C120 182, 182 144, 242 86
             C254 75, 262 77, 267 89
             C215 144, 150 189, 75 224"
          stroke="#FFF9ED" stroke-opacity="0.20" stroke-width="3.2" stroke-linecap="round" fill="none"/>

    <path d="M38 350
             C82 290, 142 227, 230 173"
          stroke="#E0C8A6" stroke-opacity="0.08" stroke-width="28" stroke-linecap="round" fill="none"/>

    <path d="M407 459
             C431 430, 448 404, 462 366"
          stroke="#FFFBEF" stroke-opacity="0.36" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M396 447
             C418 422, 434 395, 445 366"
          stroke="#FFFBEF" stroke-opacity="0.16" stroke-width="18" stroke-linecap="round" fill="none"/>
  </g>

  <polygon points="269.1,168.1 237.7,230.8 172.8,239.7 220.9,286.8 208.6,354.0 265.7,321.5 328.4,350.6 317.2,283.4 364.3,238.6 299.3,228.5" fill="url(#starShadowFill)"/>
  <polygon points="256.1,156.1 224.7,218.8 159.8,227.7 207.9,274.8 195.6,342.0 252.7,309.5 315.4,338.6 304.2,271.4 351.3,226.6 286.3,216.5" fill="url(#starBorderFill)"/>
  <polygon points="256,167 228,223 170,231 213,273 202,333 253,304 309,330 299,270 341,230 283,221" fill="#F3F3F3"/>
</svg>
